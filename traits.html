<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Черты — Справочник по Альтер-Эго</title>
    <style>
        :root {
            --bg: #0f0c08;
            --card: #1c1812;
            --accent: #c9a05f;
            --text: #d4c5a9;
            --border: #3a3024;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }
        header {
            background: #16120d;
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        h1 { color: var(--accent); margin: 0; }
        nav a { color: var(--accent); margin-right: 15px; text-decoration: none; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .trait-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            cursor: pointer;
        }
        .trait-card:hover {
            border-color: var(--accent);
        }
        .trait-header {
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 10px;
        }
        .trait-content {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .trait-card.open .trait-content {
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <h1>Черты Альтер-Эго</h1>
        <nav>
            <a href="index.html">← На главную</a>
        </nav>
    </header>

    <div class="grid" id="traitsGrid"></div>

    <script>
        const traits = [
            { name: "Выживший", desc: "Преимущество на спасброски против болезней и мутаций. +1 к Телосложению." },
            { name: "Заземление", desc: "Один раз за длинный отдых можете снять 1 уровень Поглощения. Преимущество на спасброски против эмоционального контроля." },
            { name: "Техно-Адаптация", desc: "Преимущество на ремонт техники и имплантов. Можете игнорировать один ЭМП-эффект за длинный отдых." },
            { name: "Социальная бабочка", desc: "Преимущество в обмане и убеждении. +1 к Харизме." },
            { name: "Стабильный Гештальт", desc: "Риск Поглощения снижается 1 раз за бой. +1 к Мудрости или Харизме." },
            { name: "Нетерпеливый", desc: "Один раз за короткий отдых можете потратить 2 Эссенции, чтобы получить +4 к урону на 1 минуту." },
            { name: "Связь с Партнёром", desc: "Когда вы рядом с «Партнёром», вы оба получаете +1 к КД и преимущество на один спасбросок за бой." },
            { name: "Адаптация", desc: "Сопротивление одному типу урона. +1 к Телосложению." },
            { name: "Модульный Корпус", desc: "Можно один раз за длинный отдых заменить один трейт на другой (из списка)." },
            { name: "Героическая душа", desc: "Один раз за бой можете принять весь урон вместо союзника. Вы получаете сопротивление к этому урону." },
            { name: "Лидер", desc: "Пока в группе больше 3 союзников, все получают +1 к атакам и КД." },
            { name: "Жертва", desc: "Когда вы падаете до 0 хитов, один союзник получает advantage на все атаки и +2 к КД до конца боя." }
        ];

        const grid = document.getElementById('traitsGrid');
        
        traits.forEach(trait => {
            const card = document.createElement('div');
            card.className = 'trait-card';
            card.innerHTML = `
                <div class="trait-header">${trait.name}</div>
                <div class="trait-content">${trait.desc}</div>
            `;
            card.onclick = () => card.classList.toggle('open');
            grid.appendChild(card);
        });
    </script>
</body>
</html>
