<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор Альтер-Эго</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f0c08; color: #d4c5a9; padding: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; background: #1c1812; color: #d4c5a9; border: 1px solid #8b5a2b; border-radius: 4px; }
        button { padding: 12px 20px; background: #c9a05f; color: #0f0c08; border: none; cursor: pointer; font-weight: bold; margin: 10px 5px; }
        pre { background: #1c1812; padding: 15px; overflow: auto; white-space: pre-wrap; }
        .section { margin: 20px 0; border: 1px solid #8b5a2b; padding: 15px; border-radius: 6px; }
        .block { 
            background: #1c1812; 
            padding: 12px; 
            margin: 12px 0; 
            border-left: 4px solid #c9a05f; 
            cursor: move;
            position: relative;
        }
        .block:hover { border-left-color: #f0d090; }
        .remove-btn { position: absolute; top: 8px; right: 8px; background: #8b3a3a; color: white; border: none; padding: 4px 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Редактор Альтер-Эго</h1>
    
    <div class="section">
        <label>Шаблон:</label>
        <select id="template">
            <option value="race">Раса</option>
            <option value="class">Класс</option>
            <option value="subclass">Подкласс</option>
        </select>
        
        <label>Название:</label>
        <input type="text" id="title" placeholder="Название">
        
        <label>Акцентный цвет:</label>
        <input type="color" id="accentColor" value="#c9a05f">
        
        <label>Шрифт:</label>
        <select id="font">
            <option value="'Segoe UI', sans-serif">Segoe UI</option>
            <option value="Arial, sans-serif">Arial</option>
            <option value="'Courier New', monospace">Courier New</option>
        </select>
    </div>

    <div class="section">
        <h3>Блоки контента</h3>
        <div id="blocks" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        <button onclick="addBlock('description')">+ Описание</button>
        <button onclick="addBlock('features')">+ Особенности</button>
        <button onclick="addBlock('table')">+ Таблица</button>
    </div>

    <button onclick="generateFullCode()">Сгенерировать HTML</button>
    
    <h3>Готовый код:</h3>
    <pre id="output"></pre>
    <button onclick="copyCode()">Копировать</button>

    <script>
        function allowDrop(ev) { ev.preventDefault(); }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.dataset.id);
        }

        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const dragged = document.querySelector(`[data-id="${data}"]`);
            const target = ev.target.closest('.block');
            if (target && dragged !== target) {
                const parent = document.getElementById('blocks');
                parent.insertBefore(dragged, target);
            }
        }

        let blockCounter = 0;

        function addBlock(type) {
            const container = document.getElementById('blocks');
            const id = ++blockCounter;
            
            let html = '';
            
            if (type === 'description') {
                html = `<div class="block" data-id="${id}" draggable="true" ondragstart="drag(event)">
                    <strong>Описание</strong>
                    <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
                    <textarea placeholder="Описание..." style="width:100%; height:80px;"></textarea>
                </div>`;
            } else if (type === 'features') {
                html = `<div class="block" data-id="${id}" draggable="true" ondragstart="drag(event)">
                    <strong>Особенности</strong>
                    <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
                    <textarea placeholder="Каждый пункт с новой строки" style="width:100%; height:120px;"></textarea>
                </div>`;
            } else if (type === 'table') {
                html = `<div class="block" data-id="${id}" draggable="true" ondragstart="drag(event)">
                    <strong>Таблица</strong>
                    <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
                    <textarea placeholder="Вставить HTML таблицы сюда" style="width:100%; height:100px;"></textarea>
                </div>`;
            }
            
            container.innerHTML += html;
        }

        function generateFullCode() {
            const title = document.getElementById('title').value || 'Название';
            const accent = document.getElementById('accentColor').value;
            const font = document.getElementById('font').value;

            let content = '';
            const blockElements = document.querySelectorAll('#blocks .block');
            
            blockElements.forEach(block => {
                const textarea = block.querySelector('textarea');
                if (textarea) {
                    const text = textarea.value.replace(/\n/g, '<br>');
                    content += `<div style="margin:15px 0;">${text}</div>`;
                }
            });

            const html = `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title} — Справочник по Альтер-Эго</title>
    <style>
        :root { --bg: #0f0c08; --card: #1c1812; --accent: ${accent}; --text: #d4c5a9; --border: #3a3024; }
        body { margin: 0; font-family: ${font}; background: var(--bg); color: var(--text); line-height: 1.7; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 1.5rem; margin: 1rem; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>${title}</h1>
        ${content}
    </div>
</body>
</html>`;
            
            document.getElementById('output').textContent = html;
        }

        function copyCode() {
            const output = document.getElementById('output').textContent;

/* Сетка черт */
        .traits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .trait-card {
            background: #1c1812;
            border: 1px solid #8b5a2b;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
        }
        .trait-card:hover {
            border-color: #c9a05f;
        }
        .trait-header {
            font-weight: bold;
            color: #c9a05f;
            margin-bottom: 8px;
        }
        .trait-content {
            display: none;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #3a3024;
        }
        .trait-card.open .trait-content {
            display: block;
        }
    </style>
</head>
<body>
    <h1>Редактор Альтер-Эго</h1>
    
    <div class="section">
        <h2>Добавить черту</h2>
        <label>Название черты:</label>
        <input type="text" id="traitName" placeholder="Например: Железная Воля">
        
        <label>Описание:</label>
        <textarea id="traitDesc" rows="4" placeholder="Что даёт черта..."></textarea>
        
        <button onclick="addTrait()">Добавить черту</button>
    </div>

    <div class="section">
        <h2>Черты (кликни, чтобы раскрыть)</h2>
        <div id="traitsGrid" class="traits-grid"></div>
    </div>

    <button onclick="generateFullHTML()">Сгенерировать полный HTML страницы</button>
    
    <h3>Готовый код:</h3>
    <pre id="output"></pre>
    <button onclick="copyCode()">Копировать</button>

    <script>
        let traits = [];

        function addTrait() {
            const name = document.getElementById('traitName').value.trim();
            const desc = document.getElementById('traitDesc').value.trim();
            
            if (!name || !desc) {
                alert('Заполни название и описание черты!');
                return;
            }
            
            traits.push({ name, desc });
            renderTraits();
            
            // Очистка полей
            document.getElementById('traitName').value = '';
            document.getElementById('traitDesc').value = '';
        }

        function renderTraits() {
            const container = document.getElementById('traitsGrid');
            container.innerHTML = '';
            
            traits.forEach((trait, index) => {
                const card = document.createElement('div');
                card.className = 'trait-card';
                card.innerHTML = `
                    <div class="trait-header">${trait.name}</div>
                    <div class="trait-content">${trait.desc}</div>
                `;
                
                card.onclick = () => {
                    card.classList.toggle('open');
                };
                
                container.appendChild(card);
            });
        }

        function generateFullHTML() {
            let traitsHTML = '';
            
            traits.forEach(trait => {
                traitsHTML += `
                    <div class="trait-card">
                        <div class="trait-header">${trait.name}</div>
                        <div class="trait-content">${trait.desc}</div>
                    </div>
                `;
            });

            const html = `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Черты Альтер-Эго</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f0c08; color: #d4c5a9; padding: 20px; }
        .traits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        .trait-card {
            background: #1c1812;
            border: 1px solid #8b5a2b;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
        }
        .trait-header {
            font-weight: bold;
            color: #c9a05f;
            margin-bottom: 8px;
        }
        .trait-content {
            display: none;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #3a3024;
        }
        .trait-card.open .trait-content {
            display: block;
        }
    </style>
</head>
<body>
    <h1>Черты Альтер-Эго</h1>
    <div class="traits-grid">
        ${traitsHTML}
    </div>
    
    <script>
        document.querySelectorAll('.trait-card').forEach(card => {
            card.addEventListener('click', () => {
                card.classList.toggle('open');
            });
        });
    <\/script>
</body>
</html>`;
            
            document.getElementById('output').textContent = html;
        }

            navigator.clipboard.writeText(output);
            alert('Код скопирован!');
        }
    </script>
</body>
</html>
